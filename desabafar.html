<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desabafar - Abraço Anónimo</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#faf7ff,#f5f7fb);
  color:#2e3a4b;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 40px;
  font-size:13px;
}

.logo{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:600;
}

.logo img{height:22px;}

nav a{
  margin:0 12px;
  text-decoration:none;
  color:#6b7280;
}

nav a.active{
  background:#a78bfa;
  color:white;
  padding:6px 14px;
  border-radius:20px;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:40px;
}

.hero h1{
  font-size:32px;
  margin-bottom:6px;
}

.hero p{
  font-size:14px;
  color:#6b7280;
}

/* FORM */
.form-card{
  max-width:700px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* TAGS */
.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:16px;
}

.tag{
  font-size:12px;
  padding:6px 12px;
  background:#f3f4f6;
  border-radius:20px;
  cursor:pointer;
}

.tag.active{
  background:#a78bfa;
  color:white;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:140px;
  border:none;
  background:#f9fafb;
  border-radius:12px;
  padding:12px;
  font-size:13px;
  resize:none;
}

/* BUTTON */
.submit{
  margin-top:14px;
  float:right;
  background:#a78bfa;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
}

/* NOTICE */
.notice{
  max-width:700px;
  margin:20px auto;
  background:#f3f0ff;
  padding:16px;
  border-radius:14px;
  font-size:13px;
  color:#5b5b7a;
}

/* CHAT BOLHA */
.chat-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  background:#a78bfa;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
}

.chat-box{
  position:fixed;
  bottom:90px;
  right:20px;
  width:260px;
  background:white;
  padding:16px;
  border-radius:14px;
  display:none;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  font-size:13px;
}

/* ANIMAÇÃO */
.hero,
.form-card,
.notice{
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 0.6s ease forwards;
}

.form-card{animation-delay:0.1s;}
.notice:nth-of-type(1){animation-delay:0.2s;}
.notice:nth-of-type(2){animation-delay:0.3s;}

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</
