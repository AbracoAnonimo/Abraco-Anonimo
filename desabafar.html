<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desabafar | Abraço Anónimo</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #fbf8ff;
    }

    /* HEADER */
    .topbar {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      border-bottom: 1px solid #eee;
      z-index: 100;
    }

    .nav {
      max-width: 1200px;
      margin: auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-name {
      font-weight: 700;
      font-size: 15px;
    }

    .menu {
      display: flex;
      gap: 10px;
    }

    .menu a {
      text-decoration: none;
      color: #6f7e99;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 20px;
    }

    .menu a.active {
      background: #a77ce9;
      color: white;
    }

    /* BOTÃO MOBILE */
    .menu-toggle {
      display: none;
    }

    /* MOBILE */
    @media (max-width: 760px) {

      .nav {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .menu-toggle {
        display: flex;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: none;
        background: #f4f5f8;
        font-size: 20px;
        justify-content: center;
        align-items: center;
      }

      .menu {
        display: none;
        grid-column: 1 / -1;
        flex-direction: column;
        background: white;
        margin-top: 10px;
        border-radius: 12px;
        padding: 10px;
      }

      .menu.open {
        display: flex;
      }

      .menu a {
        text-align: center;
      }
    }

    /* RESTO (simplificado para não quebrar) */
    .page {
      max-width: 800px;
      margin: auto;
      padding: 40px 20px;
    }

    textarea {
      width: 100%;
      height: 200px;
      border-radius: 20px;
      padding: 20px;
      border: none;
      background: #f5f7fa;
    }

    .publish-btn {
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 20px;
      background: #a77ce9;
      color: white;
      width: 100%;
    }
  </style>
</head>

<body>

<header class="topbar">
  <nav class="nav">

    <div class="brand">
      <div>🤍</div>
      <div class="brand-name">Abraço Anónimo</div>
    </div>

    <button class="menu-toggle" id="menuToggle">☰</button>

    <div class="menu" id="mobileMenu">
      <a href="index.html">Início</a>
      <a href="desabafar.html" class="active">Desabafar</a>
      <a href="desabafos.html">Desabafos</a>
      <a href="palavras.html">Palavras que Abraçam</a>
      <a href="diario.html">Diário</a>
      <a href="linhas.html">Linhas de Apoio</a>
      <a href="regras.html">Regras</a>
    </div>

  </nav>
</header>

<main class="page">
  <h1>Tira um peso do peito</h1>
  <p>Escreve o que sentes. Aqui é seguro.</p>

  <textarea placeholder="Escreve aqui o teu desabafo..."></textarea>
  <button class="publish-btn">Publicar desabafo</button>
</main>

<script>
const menuToggle = document.getElementById("menuToggle");
const mobileMenu = document.getElementById("mobileMenu");

menuToggle.addEventListener("click", () => {
  mobileMenu.classList.toggle("open");
});
</script>

</body>
</html>
