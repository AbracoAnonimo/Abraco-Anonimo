<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desabafos da Comunidade | Abraço Anónimo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-1: #fcfbfa;
      --bg-2: #fbf8ff;
      --white: rgba(255,255,255,0.82);
      --border: rgba(201, 188, 224, 0.35);
      --text: #34425f;
      --muted: #72829f;
      --muted-2: #9ba8bd;
      --purple: #a27be8;
      --purple-2: #9568e6;
      --pink-soft: #fdeeee;
      --blue-soft: #eef5fc;
      --green-soft: #eaf8ef;
      --shadow: 0 18px 50px rgba(119, 95, 168, 0.10);
      --shadow-soft: 0 10px 30px rgba(87, 104, 139, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(244,236,255,0.75), transparent 30%),
        radial-gradient(circle at top right, rgba(255,239,243,0.7), transparent 25%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 60;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(223, 216, 236, 0.65);
    }

    .nav {
      max-width: 1280px;
      margin: 0 auto;
      padding: 12px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 34px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 260px;
    }

    .brand-logo {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      box-shadow: none;
      font-size: 14px;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 700;
      color: #34425f;
    }

    .menu {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      flex-wrap: wrap;
      flex: 1;
    }

    .menu a {
      text-decoration: none;
      color: #6f7e99;
      font-size: 12.5px;
      font-weight: 500;
      padding: 9px 11px;
      border-radius: 999px;
      transition: 0.2s ease;
    }

    .menu a:hover,
    .menu a.active {
      background: linear-gradient(135deg, #a77ce9, #9b73e8);
      color: white;
      box-shadow: 0 8px 20px rgba(155, 115, 232, 0.18);
    }

    .nav-icons {
      min-width: 82px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: #f4f5f8;
      color: #95a0b7;
      font-size: 15px;
      cursor: pointer;
    }

    .icon-btn.gold {
      background: #fbf5dc;
      color: #d7a520;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 44px 22px 80px;
      opacity: 0;
      transform: translateY(24px);
      animation: riseFade 0.7s ease forwards;
    }

    .hero {
      text-align: center;
      margin-bottom: 34px;
      opacity: 0;
      transform: translateY(24px);
      animation: riseFade 0.7s ease forwards;
      animation-delay: 0.06s;
    }

    .hero h1 {
      margin: 0 0 14px;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      font-weight: 800;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(13px, 1.2vw, 16px);
      line-height: 1.6;
    }

    .filters-wrap {
      margin: 34px 0 22px;
      opacity: 0;
      transform: translateY(24px);
      animation: riseFade 0.7s ease forwards;
      animation-delay: 0.14s;
    }

    .filters-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #6d7d98;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .filter-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 12px;
    }

    .filter-btn {
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      background: #f3f5f8;
      color: #6f7e99;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #9d71e7, #a681eb);
      color: white;
      box-shadow: 0 8px 20px rgba(162, 123, 232, 0.18);
    }

    .empty-state {
      text-align: center;
      padding: 90px 20px 40px;
      color: #bca9e3;
      opacity: 0;
      transform: translateY(24px);
      animation: riseFade 0.7s ease forwards;
      animation-delay: 0.22s;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 14px;
    }

    .empty-title {
      font-size: 20px;
      color: #a890da;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .empty-subtitle {
      font-size: 16px;
      color: #d0d7e2;
    }

    .posts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 26px;
      opacity: 0;
      transform: translateY(24px);
      animation: riseFade 0.7s ease forwards;
      animation-delay: 0.22s;
    }

    .post-card {
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(220, 212, 234, 0.5);
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
      padding: 22px 22px 18px;
    }

    .post-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .post-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f4f5f8;
      color: #6f7e99;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
    }

    .post-date {
      color: #b0bacb;
      font-size: 13px;
    }

    .post-text {
      color: var(--text);
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
      margin-bottom: 18px;
    }

    .post-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-btn {
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      background: #f8f4ff;
      color: #8a73c2;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .action-btn.secondary {
      background: #f5f7fb;
      color: #7b8aa6;
    }

    .action-btn.report {
      background: #fff2f4;
      color: #d36b7f;
    }

    .comments-section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(226, 230, 238, 0.9);
    }

    .comments-title {
      font-size: 14px;
      font-weight: 700;
      color: #72829f;
      margin-bottom: 12px;
    }

    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    .comment-item {
      background: #f7f9fc;
      border-radius: 18px;
      padding: 12px 14px;
      color: #5e6d89;
      font-size: 14px;
      line-height: 1.6;
    }

    .comment-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .comment-input {
      flex: 1;
      min-width: 220px;
      border: 1.5px solid rgba(210, 219, 232, 0.8);
      background: rgba(255,255,255,0.95);
      border-radius: 18px;
      padding: 13px 14px;
      font-size: 14px;
      outline: none;
      color: var(--text);
    }

    .comment-btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      background: linear-gradient(135deg, #b896f0, #a982e9);
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .support-email-block {
      margin-top: 30px;
      text-align: center;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(223, 214, 239, 0.55);
      border-radius: 26px;
      padding: 22px 18px;
      box-shadow: var(--shadow-soft);
      opacity: 0;
      transform: translateY(24px);
      animation: riseFade 0.7s ease forwards;
      animation-delay: 0.30s;
    }

    .support-email-text {
      font-size: 13px;
      color: #7d8aa3;
      margin: 0 0 12px;
      line-height: 1.75;
    }

    .support-email-btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #f3ebff, #efe4fb);
      color: #8a69d8;
      font-size: 13px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(170,140,230,0.15);
      transition: all 0.2s ease;
    }

    .support-email-btn:hover {
      transform: translateY(-1px);
    }

    .support-email-note {
      margin: 10px 0 0;
      font-size: 11px;
      color: #9aa7bb;
      line-height: 1.7;
    }

    .toast {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 280px;
      max-width: calc(100vw - 30px);
      padding: 16px 20px;
      border-radius: 18px;
      color: white;
      font-weight: 600;
      box-shadow: 0 18px 35px rgba(76, 82, 108, 0.22);
      z-index: 120;
      display: none;
    }

    .toast.success {
      background: linear-gradient(135deg, #61c788, #49b46f);
    }

    .toast.error {
      background: linear-gradient(135deg, #ef7f93, #e05d71);
    }

    @keyframes riseFade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {
      .nav {
        flex-direction: column;
        align-items: stretch;
      }

      .brand,
      .nav-icons {
        justify-content: center;
      }

      .page {
        padding-top: 34px;
      }

      .comment-form {
        flex-direction: column;
      }

      .comment-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <header class="topbar">
    <nav class="nav">
      <div class="brand">
        <div class="brand-logo">🤍</div>
        <div class="brand-name">Abraço Anónimo</div>
      </div>

      <div class="menu">
        <a href="index.html">Início</a>
        <a href="desabafar.html">Desabafar</a>
        <a href="desabafos.html" class="active">Desabafos</a>
        <a href="palavras.html">Palavras que Abraçam</a>
        <a href="diario.html">Diário</a>
        <a href="linhas.html">Linhas de Apoio</a>
        <a href="regras.html">Regras</a>
      </div>

    <div class="nav-icons"></div>
    </nav>
  </header>

  <main class="page">
    <section class="hero">
      <h1>Desabafos da Comunidade</h1>
      <p>Lê, apoia e envia um abraço a quem precisa.</p>
    </section>

    <section class="filters-wrap">
      <div class="filters-title">🔎 Filtrar por tema</div>

      <div class="filter-list">
        <button class="filter-btn active" data-filter="Todos">Todos</button>
        <button class="filter-btn" data-filter="Solidão">☁️ Solidão</button>
        <button class="filter-btn" data-filter="Ansiedade">🌊 Ansiedade</button>
        <button class="filter-btn" data-filter="Luto">🕊️ Luto</button>
        <button class="filter-btn" data-filter="Relações">💖 Relações</button>
        <button class="filter-btn" data-filter="Trabalho">💼 Trabalho</button>
        <button class="filter-btn" data-filter="Família">🏠 Família</button>
        <button class="filter-btn" data-filter="Saúde">🩺 Saúde</button>
        <button class="filter-btn" data-filter="Outro">✨ Outro</button>
      </div>
    </section>

    <section id="postsContainer"></section>

    <div class="support-email-block">
  <p class="support-email-text">
    Se precisares de apoio, podes enviar um email 🤍
  </p>

  <p class="support-email-note">
    abracoanonimo.apoio@gmail.com
  </p>
</div>
  </main>

  <script>
    const postsContainer = document.getElementById("postsContainer");
    const filterButtons = document.querySelectorAll(".filter-btn");
    const toast = document.getElementById("toast");
    let currentFilter = "Todos";

    const forbiddenWords = [
      "puta", "puto", "caralho", "foda", "foder", "merda", "cabrão", "cabrao",
      "burro", "idiota", "estúpido", "estupido", "otário", "otario", "nojento",
      "nojenta", "porco", "vaca", "atrasado", "mongolóide", "mongoloide",
      "mata-te", "morre", "morre tu", "vai morrer", "és lixo", "és um lixo",
      "és ridículo", "és ridicula", "gozar contigo", "humilhar", "bullying"
    ];

    function normalizeText(text) {
      return text
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function containsForbiddenContent(text) {
      const normalized = normalizeText(text);
      return forbiddenWords.some(word => normalized.includes(normalizeText(word)));
    }

    function showToast(message, type = "success") {
      toast.textContent = message;
      toast.className = "toast " + type;
      toast.style.display = "block";

      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => {
        toast.style.display = "none";
      }, 2600);
    }

    function getPosts() {
      return JSON.parse(localStorage.getItem("abraco_desabafos") || "[]");
    }

    function savePosts(posts) {
      localStorage.setItem("abraco_desabafos", JSON.stringify(posts));
    }

    function formatDate(isoDate) {
      const date = new Date(isoDate);
      return date.toLocaleDateString("pt-PT", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderPosts() {
      const posts = getPosts();
      const filteredPosts = currentFilter === "Todos"
        ? posts
        : posts.filter(post => post.tag === currentFilter);

      if (!filteredPosts.length) {
        postsContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">♡</div>
            <div class="empty-title">Ainda não há desabafos.</div>
            <div class="empty-subtitle">Sê o primeiro a partilhar.</div>
          </div>
        `;
        return;
      }

      postsContainer.innerHTML = `
        <div class="posts-grid">
          ${filteredPosts.map(post => `
            <article class="post-card">
              <div class="post-top">
                <div class="post-tag">${post.tag}</div>
                <div class="post-date">${formatDate(post.createdAt)}</div>
              </div>

              <div class="post-text">${escapeHtml(post.text)}</div>

              <div class="post-actions">
                <button class="action-btn" onclick="giveHug(${post.id})">🤍 Oferecer abraço (${post.hugs || 0})</button>
                <button class="action-btn secondary" onclick="toggleComments(${post.id})">💬 Comentários (${(post.comments || []).length})</button>
                <button class="action-btn report" onclick="reportPost(${post.id})">🚩 Denunciar</button>
              </div>

              <div class="comments-section" id="comments-${post.id}" style="display:none;">
                <div class="comments-title">Palavras de carinho</div>

                <div class="comment-list">
                  ${(post.comments && post.comments.length)
                    ? post.comments.map(comment => `
                      <div class="comment-item">${escapeHtml(comment.text)}</div>
                    `).join("")
                    : `<div class="comment-item">Ainda não há comentários. Sê o primeiro a deixar apoio.</div>`
                  }
                </div>

                <div class="comment-form">
                  <input
                    class="comment-input"
                    id="comment-input-${post.id}"
                    type="text"
                    maxlength="300"
                    placeholder="Escreve uma mensagem de apoio..."
                  />
                  <button class="comment-btn" onclick="addComment(${post.id})">Enviar apoio</button>
                </div>
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function toggleComments(postId) {
      const box = document.getElementById(`comments-${postId}`);
      if (!box) return;
      box.style.display = box.style.display === "none" ? "block" : "none";
    }

    function giveHug(postId) {
      const posts = getPosts();
      const index = posts.findIndex(post => post.id === postId);
      if (index === -1) return;

      posts[index].hugs = (posts[index].hugs || 0) + 1;
      savePosts(posts);
      renderPosts();
      showToast("Abraço enviado 🤍", "success");
    }

    function addComment(postId) {
      const input = document.getElementById(`comment-input-${postId}`);
      if (!input) return;

      const text = input.value.trim();
      if (!text) {
        showToast("Escreve primeiro uma mensagem de apoio.", "error");
        return;
      }

      if (text.length < 2) {
        showToast("O comentário está demasiado curto.", "error");
        return;
      }

      if (containsForbiddenContent(text)) {
        showToast("Esse comentário contém linguagem não permitida.", "error");
        return;
      }

      const posts = getPosts();
      const index = posts.findIndex(post => post.id === postId);
      if (index === -1) return;

      if (!posts[index].comments) posts[index].comments = [];
      posts[index].comments.push({
        id: Date.now(),
        text
      });

      savePosts(posts);
      renderPosts();
      const reopened = document.getElementById(`comments-${postId}`);
      if (reopened) reopened.style.display = "block";
      showToast("Mensagem de apoio enviada 💜", "success");
    }

    function reportPost(postId) {
      const reported = JSON.parse(localStorage.getItem("abraco_reportados") || "[]");
      reported.push({
        id: Date.now(),
        postId,
        type: "desabafo",
        createdAt: new Date().toISOString()
      });
      localStorage.setItem("abraco_reportados", JSON.stringify(reported));
      showToast("Desabafo denunciado para revisão.", "success");
    }

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        filterButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        currentFilter = button.dataset.filter;
        renderPosts();
      });
    });

    renderPosts();
  </script>
</body>
</html>
